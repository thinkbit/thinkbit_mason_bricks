name: bloc_feature
description: A customize brick for a new feature using bloc
version: 0.1.1

# The following defines the environment for the current brick.
# It includes the version of mason that the brick requires.
environment:
  mason: ^0.1.1

# Variables specify dynamic values that your brick depends on.
vars:
  feature_name:
    type: string
    description: Name of the feature
    prompt: What is the name of your feature?
  use_copy_with:
    type: boolean
    description: Whether to generate copyWith method in state
    default: true
    prompt: Do you want to include copyWith in the state?
  use_status_enum:
    type: boolean
    description: Whether to include a Status enum for state management
    default: true
    prompt: Do you want to include a Status enum?

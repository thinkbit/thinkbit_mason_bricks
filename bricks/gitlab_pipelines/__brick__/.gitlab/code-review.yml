workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'

stages:
  - Reviewer

Reviewer:
  stage: Reviewer
  tags:
    - {{tags}}
  variables:
    DANGER_GITLAB_API_TOKEN: $GITLAB_TOKEN
    GEMINI_API_KEY: $GEMINI_API_KEY
  before_script:
    - echo "Verifying Node.js and npm versions..."
    - node -v
    - npm -v
    # - echo "Downloading Secure Files..."
    # - curl --silent "https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer" | bash
    - echo "Copying code review files from CI/CD file variables..."
    - cp "$CODE_REVIEW" danger.js
    - cp "$CODE_REVIEW_DEPS" package.json
    - echo "Installing project dependencies...."
    - npm install
  script:
    - echo "Executing Danger JS code review..."
    - npx danger ci --dangerfile danger.js
